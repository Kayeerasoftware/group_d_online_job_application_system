services:
  - type: web
    name: job-application-system
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    preDeployCommand: "php artisan optimize:clear; php artisan storage:link || true; php artisan migrate --force || true; php artisan config:cache"
    disk:
      name: app-storage
      mountPath: /var/www/html/storage/app/public
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        sync: false
      - key: APP_URL
        value: https://online-job-application-system-group-d.onrender.com/
      - key: AUDIT_LOG_GET_REQUESTS
        value: "true"
      - key: AUDIT_QUEUE_ENABLED
        value: "false"
      - key: CACHE_STORE
        value: file
      - key: CLOUDINARY_URL
        sync: false
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_DATABASE
        value: job_application_system
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_QUEUE_TABLE
        value: queue_jobs
      - key: MYSQL_ATTR_SSL_CA
        value: ca-certificates.crt
      - key: SESSION_DRIVER
        value: cookie
      - key: SESSION_EXPIRE_ON_CLOSE
        value: "false"
      - key: SESSION_LIFETIME
        value: "43200"
      - key: SESSION_SAME_SITE
        value: lax
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: QUEUE_CONNECTION
        value: sync
      - key: FILESYSTEM_DISK
        value: uploads
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
      - key: MAIL_ENCRYPTION
        value: tls
      - key: MAIL_FROM_ADDRESS
        value: kayeerasoftware@gmail.com
      - key: PHP_CATCHALL
        value: "1"
